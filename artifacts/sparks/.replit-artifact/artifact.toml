kind = "web"
previewPath = "/"
title = "Sparks - Couples Game"
version = "1.0.0"
id = "artifacts/sparks"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20747

[services.development]
run = "pnpm --filter @workspace/sparks run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sparks", "run", "build" ]
publicDir = "artifacts/sparks/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20747"
BASE_PATH = "/"
